        :root {
            --color-primary: #208090;
            --color-primary-light: #32B8C6;
            --color-secondary: #5E5240;
            --color-success: #208090;
            --color-warning: #A84B2F;
            --color-error: #C0152F;

            --color-surface: #FFFFFF;
            --color-border: #E0E0E0;
            --color-text: #1F2121;
            --color-text-light: #666666;
            --spacing-xs: 4px;
            --spacing-sm: 8px;
            --spacing-md: 16px;
            --spacing-lg: 24px;
            --spacing-xl: 32px;
            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-lg: 12px;
        }

        [data-theme="dark"] {
            --color-bg: #1a1a1a;
            --color-surface: #2d2d2d;
            --color-border: #404040;
            --color-text: #e0e0e0;
            --color-text-light: #a0a0a0;

            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--color-bg);
            color: var(--color-text);
            line-height: 1.6;

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: var(--spacing-md);

            background: linear-gradient(135deg, var(--color-primary), var(--color-primary-light));
            color: white;

            margin-bottom: var(--spacing-lg);
            border-radius: var(--radius-lg);
            display: flex;
            justify-content: space-between;

            border: 2px solid rgba(255, 255, 255, 0.4);

        .btn-primary { background: var(--color-primary); color: white; }

        .btn-danger { background: var(--color-error); color: white; }
        .btn-small { padding: var(--spacing-xs) var(--spacing-sm); font-size: 0.85rem; }

        .tabs { display: flex; gap: var(--spacing-md); border-bottom: 2px solid var(--color-border); margin-bottom: var(--spacing-lg); }
        .tab-btn { background: none; border: none; padding: var(--spacing-md) var(--spacing-lg); cursor: pointer; color: var(--color-text-light); border-bottom: 3px solid transparent; }
        .tab-btn.active { color: var(--color-primary); border-bottom-color: var(--color-primary); }

        .card { background: var(--color-surface); border-radius: var(--radius-lg); padding: var(--spacing-lg); border: 1px solid var(--color-border); margin-bottom: var(--spacing-lg); }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--spacing-md); border-bottom: 1px solid var(--color-border); padding-bottom: var(--spacing-md); }
        .card-title { font-size: 1.3rem; font-weight: 600; }
        .card-subtitle { font-size: 0.9rem; color: var(--color-text-light); margin-top: var(--spacing-sm); }

        .grid { display: grid; gap: var(--spacing-lg); margin-bottom: var(--spacing-lg); }
        .grid-2 { grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); }

        .form-group { margin-bottom: var(--spacing-lg); }
        .form-label { display: block; margin-bottom: var(--spacing-sm); font-weight: 500; }
        .form-input, .form-select, .form-textarea { width: 100%; padding: var(--spacing-sm) var(--spacing-md); border: 1px solid var(--color-border); border-radius: var(--radius-md); background: var(--color-surface); color: var(--color-text); }

<body>
    <div id="root"></div>

    <script>
        // ============================================================================
        // ESTADO Y PERSISTENCIA
        // ============================================================================
        const state = {
            bolos: [],
            jornadas: {},
            theme: 'light',
            currentView: 'list',
            currentBoloId: null,
            currentTab: 'bolos'
        };

        const storage = {
            saveState() {
                localStorage.setItem('boloTrackerState', JSON.stringify({
                    bolos: state.bolos,
                    jornadas: state.jornadas,
                    theme: state.theme,
                    currentView: state.currentView,
                    currentBoloId: state.currentBoloId,
                    currentTab: state.currentTab
                }));
            },

            loadState() {
                const saved = localStorage.getItem('boloTrackerState');
                if (saved) {
                    try {
                        const data = JSON.parse(saved);
                        state.bolos = data.bolos || [];
                        state.jornadas = data.jornadas || {};
                        state.theme = data.theme || 'light';
                        state.currentView = data.currentView || 'list';
                        state.currentBoloId = data.currentBoloId || null;
                        state.currentTab = data.currentTab || 'bolos';
                    } catch (e) {
                        console.error('Error loading state:', e);
                    }
                }
            }
        };

        // ============================================================================
        // TEMA
        // ============================================================================
        const theme = {
            init() {
                document.documentElement.setAttribute('data-theme', state.theme);
            },

            toggle() {
                state.theme = state.theme === 'light' ? 'dark' : 'light';
                document.documentElement.setAttribute('data-theme', state.theme);
                storage.saveState();
                render();
            }
        };

        // ============================================================================
        // CÁLCULOS
        // ============================================================================
        const calculations = {
            timeToMinutes(timeStr) {
                const [h, m] = timeStr.split(':').map(Number);
                return h * 60 + m;
            },

            minutesToHours(minutes) {
                const h = Math.floor(minutes / 60);
                const m = minutes % 60;
                return `${h}h ${m}min`;
            },

            normalizeWorkedMinutes(entrada, salida) {
                const entradaMin = this.timeToMinutes(entrada);
                let salidaMin = this.timeToMinutes(salida);

                if (salidaMin < entradaMin) {
                    salidaMin += 24 * 60;
                }

                return salidaMin - entradaMin;
            },

            crossesMidnight(entrada, salida) {
                return this.timeToMinutes(salida) < this.timeToMinutes(entrada);
            },

            calculateJornada(entrada, salida, tipoJornada) {
                const trabajados = this.normalizeWorkedMinutes(entrada, salida);
                const estandar = tipoJornada * 60;
                
                let extras = 0;
                if (trabajados > estandar) {
                    const extrasSinCortesia = trabajados - estandar - 10;
                    if (extrasSinCortesia > 0) {
                        extras = Math.ceil(extrasSinCortesia / 60) * 60;
                    }
                }

                return {
                    minutosTrabajados: trabajados,
                    minutosExtras: extras,
                    horasTrabajadas: this.minutesToHours(trabajados),
                    horasExtras: this.minutesToHours(extras),
                    cruzaMedianoche: this.crossesMidnight(entrada, salida)
                };
            },

            calculateDescanso(fecha1, horaEntradaJ1, horaSalidaJ1, fecha2, horaEntradaJ2) {
                const inicioJ1 = new Date(`${fecha1}T${horaEntradaJ1}`);
                const finJ1 = new Date(`${fecha1}T${horaSalidaJ1}`);
                const inicioJ2 = new Date(`${fecha2}T${horaEntradaJ2}`);

                if (this.crossesMidnight(horaEntradaJ1, horaSalidaJ1)) {
                    finJ1.setDate(finJ1.getDate() + 1);
                }

                const diff = (inicioJ2 - finJ1) / (1000 * 60);
                return diff / 60;
            },

            formatDate(date) {
                return date.toISOString().split('T')[0];
            },

            formatDateES(dateStr) {
                const date = new Date(dateStr);
                const options = { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' };
                return date.toLocaleDateString('es-ES', options);
            }
        };

        // ============================================================================
        // PROCESAMIENTO CORE - PSEUDOCÓDIGO COMPLETO
        // ============================================================================
        function procesarBolo(boloId) {
            const bolo = state.bolos.find(b => b.id === boloId);
            if (!bolo) return;

            const jornadasBolo = state.jornadas[boloId] || [];
            if (jornadasBolo.length === 0) return;

            // PASO 1: Reiniciar contadores
            jornadasBolo.forEach(jornada => {
                jornada.jornadasExtras = 0;
                jornada.jornadasExtrasPorDescanso = 0;
                jornada.jornadasExtrasPorAcumuladas = 0;
                jornada.horasExtraAFacturar = 0;
                jornada.descanso_insuficiente = false;
                jornada.aviso_descanso = null;
            });

            // PASO 2: Aplicar regla de descanso (12h mínimo)
            // Itera TODAS las transiciones entre jornadas consecutivas
            if (bolo.regla_descanso) {
                for (let i = 1; i < jornadasBolo.length; i++) {
                    const jornada_anterior = jornadasBolo[i - 1];
                    const jornada_actual = jornadasBolo[i];

                    // Solo evaluar si AMBAS jornadas tienen horas registradas
                    if (jornada_anterior.hora_entrada && 
                        jornada_anterior.hora_salida &&
                        jornada_actual.hora_entrada && 
                        jornada_actual.hora_salida) {

                        const descanso_horas = calculations.calculateDescanso(
                            jornada_anterior.fecha,
                            jornada_anterior.hora_entrada,
                            jornada_anterior.hora_salida,
                            jornada_actual.fecha,
                            jornada_actual.hora_entrada
                        );

                        // SI descanso < 12h
                        if (descanso_horas < 12) {
                            // Marcar AMBAS como afectadas
                            jornada_anterior.descanso_insuficiente = true;
                            jornada_actual.descanso_insuficiente = true;
                            
                            // La jornada ACTUAL recibe +1 JE por descanso insuficiente
                            jornada_actual.jornadasExtrasPorDescanso = 1;
                            
                            // Guardar aviso EN la jornada actual para mostrar entre el par
                            jornada_actual.aviso_descanso = {
                                fecha_anterior: jornada_anterior.fecha,
                                fecha_actual: jornada_actual.fecha,
                                descanso: descanso_horas.toFixed(2)
                            };
                        }
                    }
                }
            }

            // PASO 3: Calcular extras individuales por jornada
            let totalExtrasAcumuladas = 0;

            jornadasBolo.forEach(jornada => {
                if (jornada.hora_entrada && jornada.hora_salida) {
                    const calc = calculations.calculateJornada(
                        jornada.hora_entrada,
                        jornada.hora_salida,
                        bolo.tipo_jornada
                    );

                    jornada.minutos_trabajados = calc.minutosTrabajados;
                    jornada.minutosExtrasIndividuales = calc.minutosExtras;
                    totalExtrasAcumuladas += calc.minutosExtras;
                } else {
                    jornada.minutos_trabajados = 0;
                    jornada.minutosExtrasIndividuales = 0;
                }
            });

            // PASO 4: Aplicar regla de jornadas extra (≥4h = 1 JE)
            const UMBRAL = 240;

            if (bolo.regla_jornada_extra) {
                jornadasBolo.forEach(jornada => {
                    if (jornada.minutosExtrasIndividuales >= UMBRAL) {
                        jornada.jornadasExtrasPorAcumuladas = 1;
                        jornada.horasExtraAFacturar = 0;
                        totalExtrasAcumuladas -= UMBRAL;
                    } else if (jornada.minutosExtrasIndividuales > 0) {
                        jornada.horasExtraAFacturar = jornada.minutosExtrasIndividuales;
                    }
                });
            } else {
                jornadasBolo.forEach(jornada => {
                    if (jornada.minutosExtrasIndividuales > 0) {
                        jornada.horasExtraAFacturar = jornada.minutosExtrasIndividuales;
                    }
                });
            }

            // PASO 5: Calcular totales
            bolo.minutosExtrasGlobalBolsa = totalExtrasAcumuladas;

            jornadasBolo.forEach(jornada => {
                jornada.jornadasExtras = (
                    jornada.jornadasExtrasPorDescanso + 
                    jornada.jornadasExtrasPorAcumuladas
                );
            });

            storage.saveState();
        }

        // ============================================================================


        let deferredInstallPrompt = null;
        let swRegistration = null;
        let updateModalShown = false;

        const PWA_KEYS = {
            forcedBackup: 'boloTrackerForcedBackup',
            forcedBackupAt: 'boloTrackerForcedBackupAt',
            updatePendingReload: 'boloTrackerUpdatePendingReload'
        };

        function isStandaloneMode() {
            return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
        }

        function detectBrowserName() {
            const ua = navigator.userAgent || '';
            if (/Firefox/i.test(ua)) return 'firefox';
            if (/Edg/i.test(ua)) return 'edge';
            if (/OPR|Opera/i.test(ua)) return 'opera';
            if (navigator.brave) return 'brave';
            if (/Chrome/i.test(ua)) return 'chrome';
            if (/Safari/i.test(ua)) return 'safari';
            return 'unknown';
        }

        function showInstallButton() {
            const btn = document.getElementById('installBtn');
            if (btn && !isStandaloneMode()) {
                btn.classList.add('visible');
            }
        }

        function hideInstallButton() {
            const btn = document.getElementById('installBtn');
            if (btn) btn.classList.remove('visible');
        }

        function setInstallHelp(message = '') {
            const help = document.getElementById('installHelp');
            if (!help) return;
            help.textContent = message;
            help.style.display = message ? 'block' : 'none';
        }

        function setUpdateBackupReady(isReady, exportedAt = null) {
            const status = document.getElementById('updateBackupStatus');
            const updateBtn = document.getElementById('updateNowBtn');
            if (status) {
                status.textContent = isReady
                    ? `Copia segura generada${exportedAt ? ` (${new Date(exportedAt).toLocaleString('es-ES')})` : ''}. Ya puedes actualizar.`
                    : 'Copia obligatoria pendiente.';
            }
            if (updateBtn) {
                updateBtn.disabled = !isReady;
            }
        }

        function openUpdateModal() {
            if (updateModalShown || !navigator.serviceWorker?.controller) return;
            const modal = document.getElementById('updateModal');
            if (!modal) return;
            updateModalShown = true;
            setUpdateBackupReady(false);
            modal.classList.add('active');
        }

        function closeUpdateModal() {
            const modal = document.getElementById('updateModal');
            if (modal) modal.classList.remove('active');
        }

        function buildBackupPayload() {
            return {
                app: 'Bolo Tracker',
                version: '7.1',
                exportedAt: new Date().toISOString(),
                data: {
                    bolos: state.bolos,
                    jornadas: state.jornadas,
                    theme: state.theme
                }
            };
        }

        function persistForcedBackup(backup) {
            localStorage.setItem(PWA_KEYS.forcedBackup, JSON.stringify(backup));
            localStorage.setItem(PWA_KEYS.forcedBackupAt, backup.exportedAt);
        }

        function downloadJsonBackup(backup) {
            const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json;charset=utf-8;' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            link.href = url;
            link.download = `bolo-tracker-backup-${new Date().toISOString().split('T')[0]}.json`;
            link.click();
            setTimeout(() => URL.revokeObjectURL(url), 1000);
        }

        function restoreForcedBackupIfPending() {
            const pending = sessionStorage.getItem(PWA_KEYS.updatePendingReload);
            if (pending !== '1') return;

            sessionStorage.removeItem(PWA_KEYS.updatePendingReload);

            const raw = localStorage.getItem(PWA_KEYS.forcedBackup);
            if (!raw) return;

            try {
                const parsed = JSON.parse(raw);
                const payload = parsed.data ? parsed.data : parsed;

                if (!Array.isArray(payload.bolos) || typeof payload.jornadas !== 'object') {
                    throw new Error('Formato de backup forzado no válido');
                }

                state.bolos = payload.bolos || [];
                state.jornadas = payload.jornadas || {};
                state.theme = payload.theme || 'light';
                state.currentView = 'list';
                state.currentBoloId = null;
                state.currentTab = state.currentTab || 'bolos';

                state.bolos.forEach(bolo => procesarBolo(bolo.id));
                theme.init();
                storage.saveState();
            } catch (error) {
                console.warn('No se pudo restaurar la última copia forzada:', error);
            }
        }

        function registerServiceWorker() {
            if (!('serviceWorker' in navigator)) return;

            window.addEventListener('load', async () => {
                try {
                    swRegistration = await navigator.serviceWorker.register('./sw.js');

                    if (swRegistration.waiting && navigator.serviceWorker.controller) {
                        openUpdateModal();
                    }

                    swRegistration.addEventListener('updatefound', () => {
                        const newWorker = swRegistration.installing;
                        if (!newWorker) return;

                        newWorker.addEventListener('statechange', () => {
                            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                openUpdateModal();
                            }
                        });
                    });

                    navigator.serviceWorker.addEventListener('controllerchange', () => {
                        if (sessionStorage.getItem(PWA_KEYS.updatePendingReload) === '1') {
                            window.location.reload();
                        }
                    });
                } catch (err) {
                    console.warn('Service Worker no registrado:', err);
                }
            });
        }

        function setupPWAInstallPrompt() {
            window.addEventListener('beforeinstallprompt', (event) => {
                event.preventDefault();
                deferredInstallPrompt = event;
                setInstallHelp('');
                showInstallButton();
            });

            window.addEventListener('appinstalled', () => {
                deferredInstallPrompt = null;
                hideInstallButton();
                setInstallHelp('App instalada correctamente.');
                setTimeout(() => setInstallHelp(''), 2500);
            });
        }

        const app = {
            init() {
                storage.loadState();
                restoreForcedBackupIfPending();
                if (state.currentView === 'detail' && (!state.currentBoloId || !state.bolos.some(b => b.id === state.currentBoloId))) {
                    state.currentView = 'list';
                    state.currentBoloId = null;
                }
                theme.init();
                render();
                registerServiceWorker();
                setupPWAInstallPrompt();
                if (isStandaloneMode()) {
                    hideInstallButton();
                }
            },

            switchTab(tabName) {
                state.currentView = 'list';
                state.currentBoloId = null;
                state.currentTab = tabName;
                storage.saveState();
                render();
            },

            toggleTheme() {
                theme.toggle();
            },

            async installPWA() {
                if (isStandaloneMode()) {
                    hideInstallButton();
                    return;
                }

                if (deferredInstallPrompt) {
                    deferredInstallPrompt.prompt();
                    const choice = await deferredInstallPrompt.userChoice;
                    if (choice.outcome === 'accepted') {
                        hideInstallButton();
                        setInstallHelp('Instalación iniciada.');
                        setTimeout(() => setInstallHelp(''), 2500);
                    }
                    deferredInstallPrompt = null;
                    return;
                }

                const browser = detectBrowserName();
                if (browser === 'firefox') {
                    setInstallHelp('Firefox no ofrece instalación PWA completa como Chrome o Edge.');
                } else if (browser === 'brave') {
                    setInstallHelp('En Brave: menú del navegador → Instalar aplicación.');
                } else if (browser === 'safari') {
                    setInstallHelp('En Safari/iPhone: Compartir → Añadir a pantalla de inicio.');
                } else {
                    setInstallHelp('Usa el menú del navegador para instalar la app.');
                }
            },

            generateForcedBackup() {
                const backup = buildBackupPayload();
                persistForcedBackup(backup);
                downloadJsonBackup(backup);
                setUpdateBackupReady(true, backup.exportedAt);
            },

            applyPendingUpdate() {
                if (!swRegistration?.waiting) return;
                if (!localStorage.getItem(PWA_KEYS.forcedBackup)) {
                    setUpdateBackupReady(false);
                    return;
                }
                sessionStorage.setItem(PWA_KEYS.updatePendingReload, '1');
                swRegistration.waiting.postMessage({ type: 'SKIP_WAITING' });
                closeUpdateModal();
            },

            actualizarEstadisticas() {
                document.getElementById('tab-estadisticas').innerHTML = renderEstadisticas();
            },

            toggleEstadoBolo(boloId) {
                const bolo = state.bolos.find(b => b.id === boloId);
                if (bolo) {
                    bolo.estado = bolo.estado === 'activo' ? 'completado' : 'activo';
                    storage.saveState();
                    this.actualizarEstadisticas();
                }
            },

            resetBoloForm() {
                document.getElementById('editingBoloId').value = '';
                document.getElementById('boloModalTitle').textContent = 'Crear Nuevo Bolo';
                document.getElementById('boloSubmitBtn').textContent = 'Crear';
                document.getElementById('boloNombre').value = '';
                document.getElementById('boloTipo').value = '10';
                document.getElementById('boloFechaInicio').value = '';
                document.getElementById('boloFechaFin').value = '';
                document.getElementById('reglaDescanso').checked = true;
                document.getElementById('reglaJornadaExtra').checked = true;
            },

            openBoloModal() {
                this.resetBoloForm();
                document.getElementById('boloModal').classList.add('active');
            },

            closeBoloModal() {
                document.getElementById('boloModal').classList.remove('active');
                this.resetBoloForm();
            },

            saveBolo(event) {
                event.preventDefault();

                const editingBoloId = document.getElementById('editingBoloId').value;
                const nombre = document.getElementById('boloNombre').value;
                const tipo_jornada = parseInt(document.getElementById('boloTipo').value);
                const fecha_inicio = document.getElementById('boloFechaInicio').value;
                const fecha_fin = document.getElementById('boloFechaFin').value;
                const regla_descanso = document.getElementById('reglaDescanso').checked;
                const regla_jornada_extra = document.getElementById('reglaJornadaExtra').checked;

                if (fecha_fin < fecha_inicio) {
                    alert('La fecha fin no puede ser anterior a la fecha inicio.');
                    return;
                }

                if (editingBoloId) {
                    const boloId = parseInt(editingBoloId);
                    const bolo = state.bolos.find(b => b.id === boloId);
                    if (!bolo) return;

                    bolo.nombre = nombre;
                    bolo.tipo_jornada = tipo_jornada;
                    bolo.fecha_inicio = fecha_inicio;
                    bolo.fecha_fin = fecha_fin;
                    bolo.regla_descanso = regla_descanso;
                    bolo.regla_jornada_extra = regla_jornada_extra;

                    const jornadasExistentes = state.jornadas[boloId] || [];
                    const jornadasPorFecha = Object.fromEntries(jornadasExistentes.map(j => [j.fecha, j]));
                    const nuevasJornadas = [];

                    const start = new Date(fecha_inicio);
                    const end = new Date(fecha_fin);
                    let current = new Date(start);
                    let dayCount = 0;

                    while (current <= end) {
                        const fecha = calculations.formatDate(current);
                        const existente = jornadasPorFecha[fecha];

                        nuevasJornadas.push(existente ? {
                            ...existente,
                            id: `${boloId}-${dayCount}`,
                            bolo_id: boloId,
                            fecha
                        } : {
                            id: `${boloId}-${dayCount}`,
                            bolo_id: boloId,
                            fecha,
                            hora_entrada: null,
                            hora_salida: null,
                            minutos_trabajados: 0,
                            minutosExtrasIndividuales: 0,
                            horasExtraAFacturar: 0,
                            jornadasExtras: 0,
                            jornadasExtrasPorDescanso: 0,
                            jornadasExtrasPorAcumuladas: 0,
                            descanso_insuficiente: false,
                            aviso_descanso: null
                        });

                        current.setDate(current.getDate() + 1);
                        dayCount++;
                    }

                    state.jornadas[boloId] = nuevasJornadas;
                    procesarBolo(boloId);
                    storage.saveState();
                    this.closeBoloModal();
                    this.openBoloDetail(boloId);
                    return;
                }

                const bolo = {
                    id: Date.now(),
                    nombre,
                    tipo_jornada,
                    fecha_inicio,
                    fecha_fin,
                    estado: 'activo',
                    regla_descanso,
                    regla_jornada_extra,
                    minutosExtrasGlobalBolsa: 0
                };

                state.bolos.push(bolo);
                state.jornadas[bolo.id] = [];

                const start = new Date(bolo.fecha_inicio);
                const end = new Date(bolo.fecha_fin);
                let current = new Date(start);
                let dayCount = 0;

                while (current <= end) {
                    state.jornadas[bolo.id].push({
                        id: `${bolo.id}-${dayCount}`,
                        bolo_id: bolo.id,
                        fecha: calculations.formatDate(current),
                        hora_entrada: null,
                        hora_salida: null,
                        minutos_trabajados: 0,
                        minutosExtrasIndividuales: 0,
                        horasExtraAFacturar: 0,
                        jornadasExtras: 0,
                        jornadasExtrasPorDescanso: 0,
                        jornadasExtrasPorAcumuladas: 0,
                        descanso_insuficiente: false,
                        aviso_descanso: null
                    });

                    current.setDate(current.getDate() + 1);
                    dayCount++;
                }

                storage.saveState();
                this.closeBoloModal();
                this.openBoloDetail(bolo.id);
            },

            editBolo(boloId) {
                const bolo = state.bolos.find(b => b.id === boloId);
                if (!bolo) return;

                document.getElementById('editingBoloId').value = bolo.id;
                document.getElementById('boloModalTitle').textContent = 'Editar Bolo';
                document.getElementById('boloSubmitBtn').textContent = 'Guardar cambios';
                document.getElementById('boloNombre').value = bolo.nombre;
                document.getElementById('boloTipo').value = bolo.tipo_jornada;
                document.getElementById('boloFechaInicio').value = bolo.fecha_inicio;
                document.getElementById('boloFechaFin').value = bolo.fecha_fin;
                document.getElementById('reglaDescanso').checked = bolo.regla_descanso;
                document.getElementById('reglaJornadaExtra').checked = bolo.regla_jornada_extra;

                document.getElementById('boloModal').classList.add('active');
            },

            deleteBolo(boloId) {
                if (confirm('¿Eliminar este bolo y todas sus jornadas?')) {
                    const index = state.bolos.findIndex(b => b.id === boloId);
                    if (index !== -1) {
                        state.bolos.splice(index, 1);
                        delete state.jornadas[boloId];
                        storage.saveState();
                        render();
                    }
                }
            },

            openBoloDetail(boloId) {
                state.currentView = 'detail';
                state.currentBoloId = boloId;
                storage.saveState();
                render();
            },

            goHome() {
                state.currentView = 'list';
                state.currentBoloId = null;
                storage.saveState();
                render();
            },

            openJornadaModal(jornadaId, boloId) {
                const jornada = state.jornadas[boloId].find(j => j.id === jornadaId);
                if (!jornada) return;

                document.getElementById('jornadaId').value = jornadaId;
                document.getElementById('boloIdHidden').value = boloId;
                document.getElementById('jornadaFecha').value = jornada.fecha;
                document.getElementById('jornadaEntrada').value = jornada.hora_entrada || '';
                document.getElementById('jornadaSalida').value = jornada.hora_salida || '';

                this.updateJornadaCalculos();
                document.getElementById('jornadaModal').classList.add('active');
            },

            closeJornadaModal() {
                document.getElementById('jornadaModal').classList.remove('active');
            },

            updateJornadaCalculos() {
                const entrada = document.getElementById('jornadaEntrada').value;
                const salida = document.getElementById('jornadaSalida').value;
                const boloId = parseInt(document.getElementById('boloIdHidden').value);
                const bolo = state.bolos.find(b => b.id === boloId);

                let html = '';
                if (entrada && salida && bolo) {
                    const calc = calculations.calculateJornada(entrada, salida, bolo.tipo_jornada);
                    html = `
                        <div class="alert alert-warning">
                            <div>
                                <strong>Horas Trabajadas:</strong> ${calc.horasTrabajadas}<br>
                                <strong>Horas Extra:</strong> ${calc.horasExtras}
                                ${calc.cruzaMedianoche ? '<br><strong>Nota:</strong> salida al día siguiente (+1d)' : ''}
                            </div>
                        </div>
                    `;
                }
                document.getElementById('jornadaCalculos').innerHTML = html;
            },

            saveJornada(event) {
                event.preventDefault();

                const jornadaId = document.getElementById('jornadaId').value;
                const boloId = parseInt(document.getElementById('boloIdHidden').value);
                const entrada = document.getElementById('jornadaEntrada').value;
                const salida = document.getElementById('jornadaSalida').value;

                const jornada = state.jornadas[boloId].find(j => j.id === jornadaId);
                const bolo = state.bolos.find(b => b.id === boloId);

                if (!jornada || !bolo) return;

                const calc = calculations.calculateJornada(entrada, salida, bolo.tipo_jornada);

                jornada.hora_entrada = entrada;
                jornada.hora_salida = salida;
                jornada.minutos_trabajados = calc.minutosTrabajados;
                jornada.minutosExtrasIndividuales = calc.minutosExtras;

                procesarBolo(boloId);
                this.closeJornadaModal();
                this.openBoloDetail(boloId);
            },

            deleteJornada() {
                if (confirm('¿Eliminar esta jornada?')) {
                    const boloId = parseInt(document.getElementById('boloIdHidden').value);
                    const jornadaId = document.getElementById('jornadaId').value;

                    const index = state.jornadas[boloId].findIndex(j => j.id === jornadaId);
                    if (index !== -1) {
                        const jornada = state.jornadas[boloId][index];
                        jornada.hora_entrada = null;
                        jornada.hora_salida = null;
                        jornada.minutos_trabajados = 0;
                        jornada.minutosExtrasIndividuales = 0;
                        
                        procesarBolo(boloId);
                        storage.saveState();
                        this.closeJornadaModal();
                        this.openBoloDetail(boloId);
                    }
                }
            },

            triggerImportBackup() {
                document.getElementById('backupImportInput').click();
            },

            exportBackup() {
                const backup = buildBackupPayload();
                downloadJsonBackup(backup);
            },

            importBackup(event) {
                const file = event.target.files?.[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const parsed = JSON.parse(e.target.result);
                        const payload = parsed.data ? parsed.data : parsed;

                        if (!Array.isArray(payload.bolos) || typeof payload.jornadas !== 'object') {
                            throw new Error('Formato de backup no válido');
                        }

                        if (!confirm('¿Importar backup y sustituir los datos actuales?')) {
                            event.target.value = '';
                            return;
                        }

                        state.bolos = payload.bolos || [];
                        state.jornadas = payload.jornadas || {};
                        state.theme = payload.theme || 'light';
                        state.currentView = 'list';
                        state.currentBoloId = null;
                        state.currentTab = 'bolos';

                        state.bolos.forEach(bolo => procesarBolo(bolo.id));

                        theme.init();
                        storage.saveState();
                        render();
                        alert('Backup importado correctamente.');
                    } catch (error) {
                        alert(`No se pudo importar el backup: ${error.message}`);
                    } finally {
                        event.target.value = '';
                    }
                };

                reader.readAsText(file);
            },

            exportBoloCSV(boloId) {
                const bolo = state.bolos.find(b => b.id === boloId);
                const jornadas = state.jornadas[boloId] || [];

                let csv = 'Bolo Tracker v7.1 - Exportación\n';
                csv += `Bolo,${bolo.nombre}\n`;
                csv += `Tipo Jornada,${bolo.tipo_jornada}h\n`;
                csv += `Período,${bolo.fecha_inicio} a ${bolo.fecha_fin}\n`;
                csv += `Exportado,${new Date().toLocaleString('es-ES')}\n\n`;

                csv += 'Fecha,Entrada,Salida,Horas,Extras Ind.,A Facturar,JE Descanso,JE Acum.,Total JE\n';

                jornadas.forEach(j => {
                    csv += `${j.fecha},${j.hora_entrada || '-'},${j.hora_salida || '-'},${j.hora_entrada ? calculations.minutesToHours(j.minutos_trabajados) : '-'},${j.minutosExtrasIndividuales > 0 ? calculations.minutesToHours(j.minutosExtrasIndividuales) : '-'},${j.horasExtraAFacturar > 0 ? calculations.minutesToHours(j.horasExtraAFacturar) : '-'},${j.jornadasExtrasPorDescanso || '-'},${j.jornadasExtrasPorAcumuladas || '-'},${j.jornadasExtras || '-'}\n`;
                });

                const totalMin = jornadas.reduce((s, j) => s + (j.minutos_trabajados || 0), 0);
                const totalExt = jornadas.reduce((s, j) => s + (j.minutosExtrasIndividuales || 0), 0);
                const totalFact = jornadas.reduce((s, j) => s + (j.horasExtraAFacturar || 0), 0);
                const totalJE = jornadas.reduce((s, j) => s + (j.jornadasExtras || 0), 0);

                csv += `\n,,,${calculations.minutesToHours(totalMin)},${calculations.minutesToHours(totalExt)},${calculations.minutesToHours(totalFact)},,${totalJE}`;

                const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `${bolo.nombre}-${new Date().toISOString().split('T')[0]}.csv`;
                link.click();
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            app.init();
        });
    </script>
</body>
</html>
